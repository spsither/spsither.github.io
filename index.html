<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Free Tibet — the story of Tibet's occupation, exile, and a freedom struggle carried in language, faith, and memory." />
  <title>Free Tibet — The Freedom Struggle</title>
  <!-- Set theme before paint to avoid a flash of the wrong mode -->
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('theme');
        // Dark is the default; only go light if the user explicitly chose it.
        if (stored !== 'light') document.documentElement.classList.add('dark');

        const params = new URLSearchParams(window.location.search)
        const redirect = params.get('redirect')

        if (redirect) {
          const decoded = decodeURIComponent(redirect)

          // Replace URL BEFORE React even loads
          window.history.replaceState({}, '', decoded)
        }

      } catch (e) { }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
