  <!-- Set theme before paint to avoid a flash of the wrong mode -->
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('theme');
        // Dark is the default; only go light if the user explicitly chose it.
        if (stored !== 'light') document.documentElement.classList.add('dark');

        const params = new URLSearchParams(window.location.search)
        const redirect = params.get('redirect')

        if (redirect) {
          const decoded = decodeURIComponent(redirect)

          // Replace URL BEFORE React even loads
          window.history.replaceState({}, '', decoded)
        }

      } catch (e) { }
    })();
  </script>
