<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Loading...</title>

    <script>
      (function () {
        const path = location.pathname + location.search + location.hash

        // Encode path into query string instead of sessionStorage
        // This makes it available immediately on first paint
        const redirectUrl =
          '/?redirect=' + encodeURIComponent(path)

        location.replace(redirectUrl)
      })()
    </script>
  </head>

  <body>
    <p style="font-family: sans-serif;">Loading…</p>
  </body>
</html>
