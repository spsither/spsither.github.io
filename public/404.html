<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      // Save the current path
      sessionStorage.setItem('redirect', location.pathname + location.search)
      // Go to root
      location.replace('/')
    </script>
  </head>
  <body>
  <p style="font-family: sans-serif;">
    Loading…
  </p>
</body>
</html>
