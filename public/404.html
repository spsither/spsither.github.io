<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
        (function () {
            const path = location.pathname + location.search + location.hash
            sessionStorage.setItem('redirect', path)
            location.replace('/')
        })()
    </script>
</head>

<body>
    <p style="font-family: sans-serif;">
        Loading…
    </p>
</body>

</html>
